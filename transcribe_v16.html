<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>scribe</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font, 'Arial', sans-serif);
      background: var(--bg);
      color: var(--fg);
      max-width: 820px;
      margin: 0 auto;
      padding: 0 28px 80px;
      line-height: 1.8;
      transition: background 0.25s, color 0.25s;
    }

    body.light {
      --bg: #f7f3ec; --fg: #2a2017; --border: #d6c9b0;
      --muted: #a08c70; --interim: #6b5a42; --ts: #c4b49a;
      --ts-hover-bg: #2a2017; --ts-hover-fg: #f7f3ec;
      --tab-active-bg: #2a2017; --tab-active-fg: #f7f3ec;
      --settings-bg: #ede8df;
      --flag-color: #c0392b; --flag-line: #e0c0bc; --flag-bg: #fdf0ee;
      --flag-note-bg: #fdf6f4;
      --header-accent: #8b6f47; --cursor-color: #2a2017;
    }
    body.dark {
      --bg: #060c6e; --fg: #ffffff; --border: #2a36b0;
      --muted: #8899dd; --interim: #ccd4ff; --ts: #3a4aaa;
      --ts-hover-bg: #ffffff; --ts-hover-fg: #060c6e;
      --tab-active-bg: #ffffff; --tab-active-fg: #060c6e;
      --settings-bg: #0a1280;
      --flag-color: #ff4433; --flag-line: #aa2211; --flag-bg: #1a0808;
      --flag-note-bg: #200e0e;
      --header-accent: #ffcc00; --cursor-color: #ffffff;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .wordmark { display: flex; flex-direction: column; gap: 1px; }
    .wordmark-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.6rem; font-weight: 600;
      letter-spacing: -0.01em; color: var(--fg); line-height: 1;
    }
    .wordmark-title span { color: var(--header-accent); }
    .wordmark-sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    .projector-btn {
      height: 32px; padding: 0 10px;
      background: none; border: 1px solid var(--border);
      cursor: pointer; color: var(--muted);
      border-radius: 4px; display: flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 0.75rem;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .projector-btn:hover { color: var(--fg); border-color: var(--fg); }
    .projector-btn.active { color: var(--fg); border-color: var(--fg); background: var(--settings-bg); }
    .projector-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    .gear-btn {
      width: 32px; height: 32px; background: none;
      border: 1px solid var(--border); cursor: pointer; color: var(--muted);
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, transform 0.4s;
    }
    .gear-btn:hover { color: var(--fg); border-color: var(--fg); }
    .gear-btn.open  { transform: rotate(60deg); color: var(--fg); border-color: var(--fg); }
    .gear-btn svg   { width: 16px; height: 16px; fill: currentColor; }

    .settings {
      background: var(--settings-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 12px 16px; margin-bottom: 14px;
      display: none; flex-wrap: wrap; gap: 20px;
      align-items: center; font-size: 0.78rem; color: var(--muted);
    }
    .settings.open { display: flex; }
    .setting-group { display: flex; align-items: center; gap: 8px; }

    .settings-divider {
      width: 1px; height: 24px; background: var(--border); flex-shrink: 0;
    }
    .settings-section-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); opacity: 0.7;
    }

    .toggle-theme { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .toggle-theme button {
      border: none; border-radius: 0; padding: 3px 10px; font-size: 0.78rem;
      background: transparent; color: var(--muted); cursor: pointer; font-family: inherit;
    }
    .toggle-theme button.active { background: var(--fg); color: var(--bg); }
    .toggle-theme button:hover:not(.active) { opacity: 0.7; }

    select {
      font-family: inherit; font-size: 0.78rem; border: 1px solid var(--border);
      background: var(--bg); color: var(--fg); border-radius: 2px; padding: 2px 6px;
    }
    input[type=range] {
      -webkit-appearance: none; width: 80px; height: 4px;
      background: var(--border); border-radius: 2px; border: none; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--fg); cursor: pointer;
    }

    /* ── tabs ── */
    .tab-bar {
      display: flex; align-items: flex-end;
      margin-bottom: 0; border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; font-size: 0.8rem; font-family: inherit;
      background: transparent; color: var(--muted);
      border: 1px solid transparent; border-bottom: none;
      border-radius: 3px 3px 0 0; cursor: pointer;
      position: relative; top: 1px; white-space: nowrap;
      max-width: 200px;
    }
    .tab.active { background: var(--tab-active-bg); color: var(--tab-active-fg); border-color: var(--border); }
    .tab:hover:not(.active) { color: var(--fg); }
    .tab-name-input {
      background: transparent; border: none; outline: none;
      font: inherit; color: inherit; cursor: text;
      /* shrink to content but cap at ~160px */
      min-width: 40px; max-width: 160px; width: auto;
    }
    .tab.active .tab-name-input { color: var(--tab-active-fg); }
    .tab-close { font-size: 0.65rem; opacity: 0.5; cursor: pointer; padding: 1px 2px; border-radius: 2px; flex-shrink: 0; }
    .tab-close:hover { opacity: 1; background: rgba(128,128,128,0.2); }
    .new-tab-btn { padding: 5px 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; flex-shrink: 0; }
    .new-tab-btn:hover { color: var(--fg); }
    .tab.export-tab { font-style: italic; }

    /* ── timer ── */
    .timer-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0 6px; font-size: 0.82rem; color: var(--muted);
      border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .timer-display { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--fg); min-width: 72px; }
    .timer-display.running { color: #e03020; }

    .flag-btn {
      font-size: 0.82rem; padding: 2px 8px;
      border: 1px solid var(--flag-color);
      background: transparent; color: var(--flag-color);
      border-radius: 2px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .flag-btn:hover:not(:disabled) { background: var(--flag-color); color: #fff; }
    .flag-btn:disabled { opacity: 0.25; cursor: default; border-color: var(--border); color: var(--muted); }

    .flags { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .flag-pill {
      font-family: 'Courier New', monospace; font-size: 0.7rem;
      background: var(--flag-bg); color: var(--flag-color);
      border: 1px solid var(--flag-line);
      padding: 1px 8px; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .flag-pill:hover { opacity: 0.75; }

    /* ── controls ── */
    .controls { margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .ctrl {
      font-family: inherit; font-size: 0.82rem; padding: 5px 14px;
      border: 1px solid var(--border); background: transparent; color: var(--fg);
      cursor: pointer; border-radius: 2px; transition: opacity 0.15s;
    }
    .ctrl:hover { opacity: 0.7; }
    .ctrl.active { background: var(--fg); color: var(--bg); }
    .status { font-size: 0.78rem; color: var(--muted); font-style: italic; }
    .status.live { color: #e03020; }
    .status.err  { color: #e03020; font-style: normal; }
    #copy-btn  { margin-left: auto; font-size: 0.75rem; opacity: 0.6; }
    #clear-btn { font-size: 0.75rem; opacity: 0.6; }

    /* ── transcript ── */
    #transcript-wrap {
      max-height: 60vh; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #transcript-wrap::-webkit-scrollbar { width: 4px; }
    #transcript-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #transcript-view {
      font-size: var(--fsize, 16px);
      line-height: 1.85; min-height: 120px; word-break: break-word;
    }

    .cursor-placeholder { display: inline-flex; align-items: center; height: 1.2em; }
    .block-cursor {
      display: inline-block; width: 0.55em; height: 1.1em;
      background: var(--cursor-color);
      animation: blink 1.1s step-start infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .line { display: flex; gap: 14px; align-items: baseline; margin-bottom: 0.5em; }
    .ts {
      font-size: 0.7em; color: var(--ts); white-space: nowrap;
      font-family: 'Courier New', monospace;
      min-width: 52px; padding: 1px 4px; border-radius: 3px;
      transition: background 0.15s, color 0.15s; cursor: default;
    }
    .line:hover .ts { background: var(--ts-hover-bg); color: var(--ts-hover-fg); }
    .line-text { flex: 1; }
    .interim-line { color: var(--interim); margin-bottom: 0.5em; padding-left: 56px; }

    /* ── flag block ── */
    .flag-block { margin: 12px 0; }
    .flag-row { display: flex; align-items: center; gap: 10px; font-size: 0.72em; color: var(--flag-color); }
    .flag-row-line { flex: 1; border-top: 1px dashed var(--flag-line); }
    .flag-label-wrap { display: flex; align-items: center; gap: 4px; }
    .flag-label-input {
      font-family: 'Courier New', monospace; font-size: 1em;
      background: transparent; border: none; outline: none;
      color: var(--flag-color); cursor: text;
      min-width: 30px; max-width: 120px;
    }
    .flag-confirm-btn {
      font-size: 0.9em; background: none; border: none;
      color: var(--flag-color); cursor: pointer; padding: 0 2px;
      display: none; line-height: 1;
    }
    .flag-label-input:focus ~ .flag-confirm-btn,
    .flag-confirm-btn:focus { display: inline; }
    .flag-label-input:focus { border-bottom: 1px dashed var(--flag-color); }

    .flag-note-input {
      display: block; width: 100%; margin-top: 4px; padding: 4px 8px;
      font-family: inherit; font-size: 0.78em;
      background: var(--flag-note-bg); color: var(--flag-color);
      border: 1px dashed var(--flag-line); border-radius: 3px; outline: none;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .flag-note-input:focus { opacity: 1; }
    .flag-note-input::placeholder { color: var(--flag-line); font-style: italic; }

    /* ── export ── */
    #export-view { display: none; }
    #export-view.active { display: block; }
    #transcript-wrap.hidden { display: none; }
    .export-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .export-name-input {
      font-family: 'Lora', Georgia, serif; font-size: 1rem;
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--fg); outline: none; padding: 2px 4px; width: 240px;
    }
    .export-name-input::placeholder { color: var(--muted); }
    .export-textarea {
      width: 100%; min-height: 300px;
      font-family: 'Courier New', monospace; font-size: 0.88rem;
      background: var(--settings-bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 14px; line-height: 1.8; resize: vertical; outline: none;
    }
    #size-label, #proj-size-label { min-width: 32px; font-size: 0.78rem; }
  </style>
</head>
<body class="light">

<div class="header">
  <div class="wordmark">
    <div class="wordmark-title">sc<span>r</span>ibe</div>
    <div class="wordmark-sub">live transcription</div>
  </div>
  <div class="header-right">
    <button class="projector-btn" id="projector-btn">
      <svg viewBox="0 0 24 24"><path d="M21 3H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5v2h8v-2h5a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 14H3V5h18v12z"/></svg>
      projector
    </button>
    <button class="gear-btn" id="gear-btn">
      <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.73-.07-1.08l2.32-1.81c.21-.16.27-.46.13-.7l-2.2-3.81c-.13-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.18-.8-1.86-1.08L14.03 1.6C14 1.34 13.77 1 13.5 1h-3c-.27 0-.49.34-.53.6l-.41 2.28c-.68.28-1.3.65-1.86 1.08L4.96 3.96c-.24-.09-.53 0-.66.24L2.1 8.01c-.14.24-.08.54.13.7l2.32 1.81C4.53 10.87 4.5 11.23 4.5 11.5s.03.74.07 1.08L2.23 14.4c-.21.16-.27.46-.13.7l2.2 3.81c.13.24.42.32.66.24l2.74-1.1c.57.44 1.18.8 1.86 1.08l.41 2.28c.04.26.27.59.53.59h3c.27 0 .5-.33.54-.59l.41-2.28c.68-.28 1.3-.64 1.86-1.08l2.74 1.1c.24.09.53 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.81z"/></svg>
    </button>
  </div>
</div>

<div class="settings" id="settings-panel">
  <!-- main settings -->
  <span class="settings-section-label">main</span>
  <div class="setting-group">
    <div class="toggle-theme">
      <button id="btn-light" class="active" onclick="setTheme('light')">light</button>
      <button id="btn-dark" onclick="setTheme('dark')">contrast</button>
    </div>
  </div>
  <div class="setting-group">
    <label>font</label>
    <select id="font-select">
      <option value="'Arial', sans-serif">Arial</option>
      <option value="'Lora', Georgia, serif">Lora</option>
    </select>
  </div>
  <div class="setting-group">
    <label>size</label>
    <input type="range" id="size-slider" min="10" max="36" value="16">
    <span id="size-label">16px</span>
  </div>

  <div class="settings-divider"></div>

  <!-- projector settings -->
  <span class="settings-section-label">projector</span>
  <div class="setting-group">
    <div class="toggle-theme">
      <button id="proj-btn-light" onclick="setProjTheme('light')">light</button>
      <button id="proj-btn-dark" class="active" onclick="setProjTheme('dark')">contrast</button>
    </div>
  </div>
  <div class="setting-group">
    <label>size</label>
    <input type="range" id="proj-size-slider" min="16" max="72" value="36">
    <span id="proj-size-label">36px</span>
  </div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="new-tab-btn" id="new-tab-btn">+</button>
</div>

<div class="timer-bar">
  <span class="timer-display" id="timer-display">00:00:00</span>
  <button class="flag-btn" id="flag-btn" disabled>⚑ flag</button>
  <div class="flags" id="flags"></div>
</div>

<div class="controls">
  <button class="ctrl" id="toggle-btn">▶ transcribe</button>
  <span class="status" id="status">idle</span>
  <button class="ctrl" id="clear-btn">clear</button>
  <button class="ctrl" id="copy-btn">copy &amp; export</button>
</div>

<div id="transcript-wrap">
  <div id="transcript-view">
    <span class="cursor-placeholder"><span class="block-cursor"></span></span>
  </div>
</div>

<div id="export-view">
  <div class="export-name-row">
    <input class="export-name-input" id="export-name" placeholder="name this export…" />
  </div>
  <textarea class="export-textarea" id="export-textarea" spellcheck="false"></textarea>
</div>

<script>
  // ── autoscroll ──
  const transcriptWrap = document.getElementById('transcript-wrap');
  let userScrolledUp = false;
  transcriptWrap.addEventListener('scroll', () => {
    const d = transcriptWrap.scrollHeight - transcriptWrap.scrollTop - transcriptWrap.clientHeight;
    userScrolledUp = d > 40;
  });
  function scrollToBottom() {
    if (!userScrolledUp) transcriptWrap.scrollTop = transcriptWrap.scrollHeight;
  }

  // ── projector state ──
  let projWin      = null;
  let projTheme    = 'dark';
  let projFsize    = '36px';
  let isLive       = false;

  function projectorHTML() {
    return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>scribe — projector</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    font-size: 36px;
    line-height: 1.7;
    padding: 60px 80px 80px;
    min-height: 100vh;
    word-break: break-word;
    transition: background 0.25s, color 0.25s;
  }
  body.light {
    background: #f7f3ec; color: #2a2017;
    --interim: #6b5a42; --flag: #c0392b; --flag-line: #e0c0bc; --note: #c0a090;
    --ts-bg: #2a2017; --ts-fg: #f7f3ec;
  }
  body.dark {
    background: #060c6e; color: #ffffff;
    --interim: #ccd4ff; --flag: #ff4433; --flag-line: #aa2211; --note: #cc8880;
    --ts-bg: #ffffff; --ts-fg: #060c6e;
  }

  /* live indicator */
  #live-dot {
    position: fixed; top: 20px; right: 24px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #888; transition: background 0.3s;
  }
  #live-dot.live {
    background: #e03020;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,48,32,0.5); }
    50%       { box-shadow: 0 0 0 8px rgba(224,48,32,0); }
  }

  #content { max-width: 1100px; margin: 0 auto; }

  .line { display: flex; gap: 20px; align-items: baseline; margin-bottom: 0.5em; }
  .ts {
    font-family: 'Courier New', monospace;
    font-size: 0.55em; white-space: nowrap;
    min-width: 52px; padding: 3px 7px; border-radius: 3px;
    background: var(--ts-bg); color: var(--ts-fg); flex-shrink: 0;
  }
  .line-text { flex: 1; }
  .interim-line { color: var(--interim); margin-bottom: 0.5em; padding-left: 72px; font-size: 0.9em; }

  .flag-block { margin: 20px 0; }
  .flag-row { display: flex; align-items: center; gap: 16px; font-size: 0.5em; color: var(--flag); }
  .flag-row-line { flex: 1; border-top: 1px dashed var(--flag-line); }
  .flag-row-label { font-family: 'Courier New', monospace; white-space: nowrap; }
  .flag-note { font-size: 0.45em; color: var(--note); font-style: italic; margin-top: 4px; padding-left: 4px; }

  .cursor-placeholder { display: inline-flex; align-items: center; height: 1.2em; }
  .block-cursor {
    display: inline-block; width: 0.45em; height: 0.95em;
    background: currentColor;
    animation: blink 1.1s step-start infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body class="dark">
  <div id="live-dot"></div>
  <div id="content"><span class="cursor-placeholder"><span class="block-cursor"></span></span></div>
  <script>
    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === 'scribe-update') {
        document.getElementById('content').innerHTML = e.data.html;
        window.scrollTo(0, document.body.scrollHeight);
      }
      if (e.data.type === 'scribe-theme') {
        document.body.className = e.data.theme;
        if (e.data.font) document.body.style.fontFamily = e.data.font;
        if (e.data.fsize) document.body.style.fontSize = e.data.fsize;
      }
      if (e.data.type === 'scribe-live') {
        const dot = document.getElementById('live-dot');
        if (e.data.live) dot.classList.add('live');
        else dot.classList.remove('live');
      }
    });
  <\/script>
</body>
</html>`;
  }

  function openProjector() {
    projWin = window.open('', 'scribe-projector', 'width=1280,height=720');
    projWin.document.open();
    projWin.document.write(projectorHTML());
    projWin.document.close();
    projWin.addEventListener('beforeunload', () => {
      projWin = null;
      document.getElementById('projector-btn').classList.remove('active');
    });
    document.getElementById('projector-btn').classList.add('active');
    setTimeout(() => {
      pushThemeToProjector();
      pushToProjector('');
      pushLiveState();
    }, 400);
  }

  function pushToProjector(interim) {
    if (!projWin || projWin.closed) return;
    projWin.postMessage({ type: 'scribe-update', html: buildProjectorHTML(interim) }, '*');
  }

  function pushThemeToProjector() {
    if (!projWin || projWin.closed) return;
    projWin.postMessage({ type: 'scribe-theme', theme: projTheme, fsize: projFsize }, '*');
  }

  function pushLiveState() {
    if (!projWin || projWin.closed) return;
    projWin.postMessage({ type: 'scribe-live', live: isLive }, '*');
  }

  document.getElementById('projector-btn').addEventListener('click', () => {
    if (projWin && !projWin.closed) projWin.focus();
    else openProjector();
  });

  // ── settings ──
  const gearBtn = document.getElementById('gear-btn');
  gearBtn.addEventListener('click', () => {
    document.getElementById('settings-panel').classList.toggle('open');
    gearBtn.classList.toggle('open');
  });

  function setTheme(t) {
    document.body.className = t;
    document.getElementById('btn-light').classList.toggle('active', t === 'light');
    document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
  }

  function setProjTheme(t) {
    projTheme = t;
    document.getElementById('proj-btn-light').classList.toggle('active', t === 'light');
    document.getElementById('proj-btn-dark').classList.toggle('active', t === 'dark');
    pushThemeToProjector();
  }

  document.getElementById('font-select').addEventListener('change', e => {
    document.body.style.setProperty('--font', e.target.value);
  });
  document.body.style.setProperty('--font', "'Arial', sans-serif");

  const sizeSlider  = document.getElementById('size-slider');
  const sizeLabelEl = document.getElementById('size-label');
  sizeSlider.addEventListener('input', () => {
    document.body.style.setProperty('--fsize', sizeSlider.value + 'px');
    sizeLabelEl.textContent = sizeSlider.value + 'px';
  });

  const projSizeSlider  = document.getElementById('proj-size-slider');
  const projSizeLabelEl = document.getElementById('proj-size-label');
  projSizeSlider.addEventListener('input', () => {
    projFsize = projSizeSlider.value + 'px';
    projSizeLabelEl.textContent = projFsize;
    pushThemeToProjector();
  });

  // ── tabs ──
  let tabs = [{ id: 1, type: 'session', name: 'Session 1', lines: [], pending: '' }];
  let activeTabId = 1, tabCounter = 1;
  function getTab(id)   { return tabs.find(t => t.id === id); }
  function currentTab() { return getTab(activeTabId); }

  function autoSizeInput(input) {
    // ghost span trick to measure text width
    let ghost = document.getElementById('_tab-ghost');
    if (!ghost) {
      ghost = document.createElement('span');
      ghost.id = '_tab-ghost';
      ghost.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;font-size:0.8rem;';
      document.body.appendChild(ghost);
    }
    ghost.textContent = input.value || input.placeholder || ' ';
    const w = Math.min(Math.max(ghost.offsetWidth + 4, 40), 160);
    input.style.width = w + 'px';
  }

  function renderTabs() {
    const bar = document.getElementById('tab-bar');
    const newBtn = document.getElementById('new-tab-btn');
    bar.querySelectorAll('.tab').forEach(el => el.remove());
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeTabId ? ' active' : '') + (tab.type === 'export' ? ' export-tab' : '');

      const nameInput = document.createElement('input');
      nameInput.className = 'tab-name-input';
      nameInput.value     = tab.name;
      autoSizeInput(nameInput);
      nameInput.addEventListener('input', e => {
        tab.name = e.target.value;
        autoSizeInput(e.target);
      });
      nameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.target.blur(); }
      });
      nameInput.addEventListener('click', e => e.stopPropagation());
      el.appendChild(nameInput);

      if (tabs.length > 1) {
        const x = document.createElement('span');
        x.className = 'tab-close'; x.textContent = '✕';
        x.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
        el.appendChild(x);
      }
      el.addEventListener('click', () => switchTab(tab.id));
      bar.insertBefore(el, newBtn);
    });
  }

  function switchTab(id) {
    activeTabId = id; renderTabs(); userScrolledUp = false;
    const tab = currentTab();
    tab.type === 'export' ? showExportView(tab) : (showTranscriptView(), renderTranscript());
  }
  function closeTab(id) {
    if (tabs.length === 1) return;
    tabs = tabs.filter(t => t.id !== id);
    if (activeTabId === id) activeTabId = tabs[tabs.length - 1].id;
    renderTabs(); switchTab(activeTabId);
  }
  document.getElementById('new-tab-btn').addEventListener('click', () => {
    tabCounter++;
    tabs.push({ id: tabCounter, type: 'session', name: `Session ${tabCounter}`, lines: [], pending: '' });
    switchTab(tabCounter); resetTimer();
  });

  // ── export ──
  const transcriptView = document.getElementById('transcript-view');
  const exportView     = document.getElementById('export-view');
  function showTranscriptView() {
    transcriptWrap.classList.remove('hidden');
    exportView.classList.remove('active');
  }
  function showExportView(tab) {
    transcriptWrap.classList.add('hidden');
    exportView.classList.add('active');
    document.getElementById('export-name').value     = tab.exportName || '';
    document.getElementById('export-textarea').value = tab.content   || '';
  }
  document.getElementById('export-name').addEventListener('input', e => {
    const tab = currentTab();
    if (tab && tab.type === 'export') { tab.exportName = e.target.value; tab.name = e.target.value || 'export'; renderTabs(); }
  });
  document.getElementById('export-textarea').addEventListener('input', e => {
    const tab = currentTab();
    if (tab && tab.type === 'export') tab.content = e.target.value;
  });

  // ── timer ──
  let timerInterval = null, timerStart = null, timerElapsed = 0;
  let timerRunning = false, flagCount = 0;
  function formatElapsed(ms) {
    const t = Math.floor(ms / 1000);
    return [Math.floor(t/3600), Math.floor((t%3600)/60), t%60].map(n => String(n).padStart(2,'0')).join(':');
  }
  function elapsedNow() { return timerRunning ? Date.now() - timerStart : timerElapsed; }
  function startTimer() {
    timerStart = Date.now() - timerElapsed; timerRunning = true;
    document.getElementById('timer-display').classList.add('running');
    document.getElementById('flag-btn').disabled = false;
    timerInterval = setInterval(() => {
      timerElapsed = Date.now() - timerStart;
      document.getElementById('timer-display').textContent = formatElapsed(timerElapsed);
    }, 500);
  }
  function pauseTimer() {
    clearInterval(timerInterval); timerRunning = false;
    if (timerStart) timerElapsed = Date.now() - timerStart;
    document.getElementById('timer-display').classList.remove('running');
  }
  function resetTimer() {
    clearInterval(timerInterval); timerRunning = false; timerElapsed = 0; flagCount = 0;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('timer-display').classList.remove('running');
    document.getElementById('flag-btn').disabled = true;
    document.getElementById('flags').innerHTML = '';
  }

  document.getElementById('flag-btn').addEventListener('click', () => {
    if (!timerRunning) return;
    flagCount++;
    const elapsed = formatElapsed(elapsedNow());
    const fid = flagCount;
    const pill = document.createElement('span');
    pill.className = 'flag-pill';
    pill.innerHTML = `⚑ F${fid} ${elapsed}`;
    pill.addEventListener('click', () => {
      const el = document.getElementById(`flag-${fid}`);
      if (el) { userScrolledUp = true; el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    });
    document.getElementById('flags').appendChild(pill);
    const tab = currentTab();
    if (tab && tab.type === 'session') {
      tab.lines.push({ type: 'flag', id: fid, label: `F${fid}`, elapsed, note: '' });
      renderTranscript();
    }
  });

  // ── projector HTML (last 6 content lines) ──
  function buildProjectorHTML(interim) {
    const tab = currentTab();
    if (!tab || tab.type === 'export') return '<span class="cursor-placeholder"><span class="block-cursor"></span></span>';

    // collect all lines, keep last 6 non-flag lines (flags always show if recent)
    const contentLines = tab.lines.filter(l => l.type === 'line');
    const last6 = contentLines.slice(-6);
    const cutoffIdx = last6.length > 0 ? tab.lines.indexOf(last6[0]) : tab.lines.length;

    // include any flags that come after the cutoff line
    const visible = tab.lines.slice(cutoffIdx);

    if (visible.length === 0 && !tab.pending) {
      return '<span class="cursor-placeholder"><span class="block-cursor"></span></span>';
    }

    let html = '';
    visible.forEach(l => {
      if (l.type === 'flag') {
        const noteHtml = l.note ? `<div class="flag-note">${l.note}</div>` : '';
        html += `<div class="flag-block">
          <div class="flag-row">
            <div class="flag-row-line"></div>
            <div class="flag-row-label">⚑ ${l.label} &nbsp; ${l.elapsed}</div>
            <div class="flag-row-line"></div>
          </div>${noteHtml}
        </div>`;
      } else {
        html += `<div class="line">
          <span class="ts">${l.elapsed}</span>
          <span class="line-text">${l.text}</span>
        </div>`;
      }
    });
    if (interim) html += `<div class="interim-line">${interim}</div>`;
    return html;
  }

  // ── main transcript render ──
  function renderTranscript(interim) {
    const tab = currentTab();
    if (!tab || tab.type === 'export') return;

    if (tab.lines.length === 0 && !interim) {
      transcriptView.innerHTML = '<span class="cursor-placeholder"><span class="block-cursor"></span></span>';
      pushToProjector(''); return;
    }

    let html = '';
    tab.lines.forEach(l => {
      if (l.type === 'flag') {
        html += `<div class="flag-block" id="flag-${l.id}">
          <div class="flag-row">
            <div class="flag-row-line"></div>
            <div class="flag-label-wrap">
              ⚑&nbsp;
              <input class="flag-label-input" value="${l.label}" data-flag-id="${l.id}" data-type="label" />
              <button class="flag-confirm-btn" data-flag-id="${l.id}">✓</button>
            </div>
            &nbsp;${l.elapsed}
            <div class="flag-row-line"></div>
          </div>
          <input class="flag-note-input" placeholder="add a note…"
            value="${l.note || ''}" data-flag-id="${l.id}" data-type="note" />
        </div>`;
      } else {
        html += `<div class="line">
          <span class="ts">${l.elapsed}</span>
          <span class="line-text">${l.text}</span>
        </div>`;
      }
    });
    if (interim) html += `<div class="interim-line">${interim}</div>`;
    transcriptView.innerHTML = html;

    // bind flag inputs
    transcriptView.querySelectorAll('.flag-label-input').forEach(input => {
      const confirmBtn = input.nextElementSibling;

      input.addEventListener('focus', () => { if (confirmBtn) confirmBtn.style.display = 'inline'; });
      input.addEventListener('blur', () => {
        setTimeout(() => { if (confirmBtn) confirmBtn.style.display = 'none'; }, 150);
        updateFlag(input);
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { input.blur(); }
      });
      input.addEventListener('input', e => updateFlag(e.target));

      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => { input.blur(); });
      }
    });

    transcriptView.querySelectorAll('.flag-note-input').forEach(input => {
      input.addEventListener('input', e => updateFlag(e.target));
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      });
    });

    scrollToBottom();
    pushToProjector(interim);
  }

  function updateFlag(input) {
    const fid  = parseInt(input.dataset.flagId);
    const type = input.dataset.type;
    const tab  = currentTab();
    const flagLine = tab && tab.lines.find(l => l.type === 'flag' && l.id === fid);
    if (!flagLine) return;
    if (type === 'label') flagLine.label = input.value;
    if (type === 'note')  flagLine.note  = input.value;
    pushToProjector();
  }

  // ── speech ──
  const toggleBtn = document.getElementById('toggle-btn');
  const statusEl  = document.getElementById('status');
  const clearBtn  = document.getElementById('clear-btn');
  const copyBtn   = document.getElementById('copy-btn');
  let isRecording = false;

  function setStatus(text, cls) { statusEl.textContent = text; statusEl.className = 'status ' + (cls || ''); }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setStatus('not supported — use Chrome or Edge', 'err');
  } else {
    const recognition = new SpeechRecognition();
    recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';

    recognition.onstart = () => {
      setStatus('● transcribing', 'live');
      isLive = true; pushLiveState();
    };

    recognition.onresult = (e) => {
      const tab = currentTab();
      if (!tab || tab.type === 'export') return;
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const text = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal) {
          tab.pending += (tab.pending ? ' ' : '') + text;
          if (/[.!?]$/.test(tab.pending) || tab.pending.length >= 40) {
            tab.lines.push({ type: 'line', elapsed: formatElapsed(elapsedNow()), text: tab.pending });
            tab.pending = '';
          }
        } else { interim += text; }
      }
      renderTranscript(interim ? (tab.pending ? tab.pending + ' ' + interim : interim) : (tab.pending || ''));
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed') { setStatus('mic access denied', 'err'); stopRec(); }
    };

    recognition.onend = () => {
      const tab = currentTab();
      if (tab && tab.type === 'session' && tab.pending.trim()) {
        tab.lines.push({ type: 'line', elapsed: formatElapsed(elapsedNow()), text: tab.pending });
        tab.pending = ''; renderTranscript('');
      }
      if (isRecording) setTimeout(() => { if (isRecording) try { recognition.start(); } catch(e) {} }, 200);
      else { setStatus('idle'); isLive = false; pushLiveState(); }
    };

    function stopRec() {
      isRecording = false;
      try { recognition.stop(); } catch(e) {}
      toggleBtn.textContent = '▶ transcribe';
      toggleBtn.classList.remove('active');
      pauseTimer(); setStatus('idle');
      isLive = false; pushLiveState();
    }

    toggleBtn.addEventListener('click', () => {
      if (isRecording) { stopRec(); }
      else {
        isRecording = true;
        try { recognition.start(); } catch(e) {}
        toggleBtn.textContent = '■ stop';
        toggleBtn.classList.add('active');
        startTimer();
      }
    });

    clearBtn.addEventListener('click', () => {
      const tab = currentTab();
      if (!tab || tab.type === 'export') return;
      tab.lines = []; tab.pending = ''; userScrolledUp = false;
      renderTranscript(''); resetTimer();
    });

    copyBtn.addEventListener('click', () => {
      const tab = currentTab();
      if (!tab || tab.type === 'export') return;
      const text = tab.lines.map(l =>
        l.type === 'flag'
          ? `\n--- ⚑ ${l.label} @ ${l.elapsed}${l.note ? ' — ' + l.note : ''} ---\n`
          : `[${l.elapsed}] ${l.text}`
      ).join('\n');
      navigator.clipboard.writeText(text);
      tabCounter++;
      tabs.push({ id: tabCounter, type: 'export', name: 'export', exportName: '', content: text });
      renderTabs(); switchTab(tabCounter);
      copyBtn.textContent = 'exported!';
      setTimeout(() => copyBtn.textContent = 'copy & export', 1800);
    });
  }

  renderTabs(); showTranscriptView(); renderTranscript();
</script>
</body>
</html>
